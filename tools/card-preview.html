<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CardSight - Physical Card Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #ccc;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      color: #d4a017;
      margin-bottom: 6px;
      font-size: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin: 16px 0 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls select, .controls button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      font-size: 14px;
      cursor: pointer;
    }

    .controls select:hover, .controls button:hover {
      border-color: #666;
    }

    .preview-area {
      transform: scale(var(--preview-scale, 0.42));
      transform-origin: top center;
      margin-bottom: -600px;
    }

    /* === CARD === */
    .card {
      width: 1050px;
      height: 1725px;
      position: relative;
      border-radius: 42px;
      overflow: hidden;
    }

    /* Background layer: base color */
    .card-bg {
      position: absolute;
      inset: 0;
      background: var(--card-color);
    }

    /* Light shafts — ATN style, thick diagonal bands toward bottom-left */
    .card-shafts {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .shaft {
      position: absolute;
      top: -60%;
      height: 280%;
      transform: rotate(30deg);
      transform-origin: center center;
      background: linear-gradient(
        to right,
        transparent 0%,
        var(--shaft-color) 20%,
        var(--shaft-color) 50%,
        var(--shaft-color-fade) 80%,
        transparent 100%
      );
    }

    /* Sparkles */
    .card-sparkles {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(2.5px 2.5px at 180px 250px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 750px 400px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 400px 700px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 850px 900px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 250px 1100px, var(--sparkle-color), transparent),
        radial-gradient(2.5px 2.5px at 600px 1300px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 900px 1500px, var(--sparkle-color), transparent),
        radial-gradient(3.5px 3.5px at 150px 1550px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 500px 300px, var(--sparkle-color), transparent),
        radial-gradient(2.5px 2.5px at 700px 1050px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 350px 1400px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 820px 200px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 480px 1600px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 130px 800px, var(--sparkle-color), transparent),
        radial-gradient(1.5px 1.5px at 300px 450px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 650px 650px, var(--sparkle-color), transparent),
        radial-gradient(2.5px 2.5px at 950px 1200px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 100px 1000px, var(--sparkle-color), transparent);
      pointer-events: none;
    }

    /* Outer dark border */
    .card-outer-border {
      position: absolute;
      inset: 0;
      border: 8px solid var(--dark-border);
      border-radius: 42px;
      pointer-events: none;
      z-index: 3;
    }

    /* Outer color border */
    .card-color-border {
      position: absolute;
      inset: 8px;
      border: 22px solid var(--border-color);
      border-radius: 34px;
      pointer-events: none;
      z-index: 3;
    }

    /* Inner color border (the prominent frame) */
    .card-inner-border {
      position: absolute;
      inset: 50px;
      border: 22px solid var(--border-color);
      border-radius: 20px;
      pointer-events: none;
      z-index: 3;
    }

    /* Corner spade spokes — protruding inward from inner border corners */
    .corner-spade {
      position: absolute;
      z-index: 4;
      font-size: 64px;
      color: var(--border-color);
      line-height: 1;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .corner-spade-tl {
      top: 58px;
      left: 58px;
      transform: rotate(135deg);
    }
    .corner-spade-tr {
      top: 58px;
      right: 58px;
      transform: rotate(225deg);
    }
    .corner-spade-bl {
      bottom: 58px;
      left: 58px;
      transform: rotate(45deg);
    }
    .corner-spade-br {
      bottom: 58px;
      right: 58px;
      transform: rotate(-45deg);
    }

    /* Content area */
    .card-content {
      position: absolute;
      inset: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 50px 5px 60px;
      z-index: 2;
    }

    .card-name-box {
      width: 100%;
      height: 430px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-name {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-weight: 700;
      color: var(--text-color);
      text-align: center;
      line-height: 1.1;
      text-shadow:
        3px 3px 6px rgba(0,0,0,0.6),
        0 0 30px rgba(0,0,0,0.3);
      width: 100%;
      padding: 0 10px;
    }

    .card-icon {
      width: 200px;
      height: 200px;
      opacity: 0.8;
      filter: drop-shadow(3px 3px 8px rgba(0,0,0,0.6)) drop-shadow(0 0 40px rgba(0,0,0,0.2));
    }

    .card-icon svg {
      width: 100%;
      height: 100%;
      fill: var(--text-color);
    }

    .card-qr {
      width: 480px;
      height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-qr canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    /* Card back */
    .card-back-content {
      position: absolute;
      inset: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px 80px;
      z-index: 2;
    }
    .card-back-title {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-weight: 700;
      font-size: 64px;
      color: var(--text-color);
      text-align: center;
      line-height: 1.1;
      text-shadow:
        3px 3px 6px rgba(0,0,0,0.6),
        0 0 30px rgba(0,0,0,0.3);
    }

    /* Info below card */
    .card-info {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

    const SHAFT_DEFS = [
      { x: '8%',  w: 200 },
      { x: '22%', w: 70  },
      { x: '35%', w: 320 },
      { x: '50%', w: 100 },
      { x: '62%', w: 250 },
      { x: '75%', w: 55  },
      { x: '85%', w: 180 },
      { x: '15%', w: 140 },
      { x: '45%', w: 60  },
      { x: '92%', w: 90  },
    ];

    const cardEl = document.getElementById('card');
    const nameEl = document.getElementById('cardName');
    const iconEl = document.getElementById('cardIcon');

    // SVG icon paths for each number (viewBox 0 0 100 100)
    const ICONS = {
      1: '<svg viewBox="0 0 100 100"><polygon points="50,5 61,38 97,38 68,59 79,93 50,72 21,93 32,59 3,38 39,38"/></svg>', // Star
      2: '<svg viewBox="0 0 100 100"><polygon points="50,5 95,50 50,95 5,50"/></svg>', // Diamond
      3: '<svg viewBox="0 0 100 100"><path d="M50,15 A35,35 0 0,1 50,85 A55,55 0 0,0 50,15 Z"/></svg>', // Crescent Moon
      4: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="4"/><polygon points="50,6 55,44 94,50 55,56 50,94 45,56 6,50 45,44" /><polygon points="50,20 53,44 78,22 55,46 78,78 55,54 50,80 45,54 22,78 45,46 22,22 47,44" opacity="0.4"/></svg>', // Compass Rose
      5: '<svg viewBox="0 0 100 100"><path d="M50,95 C25,75 10,55 10,30 L10,15 L50,5 L90,15 L90,30 C90,55 75,75 50,95 Z"/><path d="M50,85 C30,70 20,53 20,33 L20,22 L50,14 L80,22 L80,33 C80,53 70,70 50,85 Z" fill="var(--card-color)"/><path d="M50,78 C34,65 27,51 27,35 L27,27 L50,20 L73,27 L73,35 C73,51 66,65 50,78 Z"/></svg>', // Shield with inner border
      6: '<svg viewBox="0 0 100 100"><path d="M50,5 L58,30 L85,15 L72,40 L97,50 L72,60 L85,85 L58,70 L50,95 L42,70 L15,85 L28,60 L3,50 L28,40 L15,15 L42,30 Z"/></svg>', // Crown/6-pointed star
      7: '<svg viewBox="62 62 617 617"><g transform="translate(0,740) scale(0.1,-0.1)"><path d="M3825 6507 c-618 -300 -938 -723 -912 -1205 8 -138 28 -211 116 -408 82 -186 108 -262 121 -356 27 -191 -62 -385 -198 -434 -56 -20 -143 -17 -207 7 -168 63 -260 220 -273 465 -5 83 -10 121 -17 116 -6 -4 -40 -41 -76 -82 -251 -292 -463 -725 -538 -1105 -118 -593 26 -1203 385 -1636 331 -399 890 -630 1524 -630 207 0 341 13 505 47 613 130 1083 487 1261 961 14 37 37 115 52 173 23 94 26 124 26 290 1 201 -10 277 -63 433 -93 274 -276 496 -499 607 -33 16 -65 30 -70 30 -5 0 -1 -30 10 -67 25 -89 27 -223 4 -278 -22 -52 -61 -92 -103 -106 -83 -27 -197 27 -245 116 -73 135 -36 291 136 565 196 314 178 717 -48 1065 -84 129 -209 248 -411 390 -356 251 -471 419 -469 690 1 145 44 281 121 383 15 20 19 32 11 32 -7 0 -71 -29 -143 -63z"/></g></svg>', // Flame (traced from design)
      8: '<svg viewBox="0 0 100 100"><polygon points="25,8 75,8 85,18 85,18"/><polygon points="15,92 85,92 75,82 25,82"/><polygon points="25,8 15,18 15,18"/><polygon points="75,8 85,18 85,18"/><path d="M25,8 L15,18 L35,50 L15,82 L25,92 L75,92 L85,82 L65,50 L85,18 L75,8 Z M30,14 L70,14 L78,20 L60,50 L78,80 L70,86 L30,86 L22,80 L40,50 L22,20 Z"/><polygon points="45,25 48,28 45,31 42,28"/><polygon points="57,36 60,39 57,42 54,39"/><polygon points="40,66 43,69 40,72 37,69"/><polygon points="55,73 58,76 55,79 52,76"/></svg>', // Hourglass with sand
      9: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="6"/><circle cx="50" cy="50" r="22"/><circle cx="50" cy="50" r="8" fill="var(--card-color)"/><path d="M50,4 L50,0 M50,96 L50,100 M4,50 L0,50 M96,50 L100,50 M17,17 L13,13 M83,17 L87,13 M17,83 L13,87 M83,83 L87,87" stroke="currentColor" stroke-width="5"/></svg>', // Eye/Sun with rays
    };
    const qrEl = document.getElementById('cardQr');
    const infoEl = document.getElementById('cardInfo');
    const shaftsEl = document.getElementById('cardShafts');
    const colorFilter = document.getElementById('colorFilter');
    const cardSelect = document.getElementById('cardSelect');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const flipBtn = document.getElementById('flipBtn');

    let filteredCards = [...CARDS];
    let currentIndex = 0;
    let showingBack = false;

    function populateCardSelect() {
      cardSelect.innerHTML = '';
      const color = colorFilter.value;
      const baseColor = color.replace('-alt', '');
      filteredCards = color === 'all'
        ? [...CARDS]
        : CARDS.filter(c => c.color === baseColor);
      filteredCards.forEach((c, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${c.color} ${c.number} — ${c.name}`;
        cardSelect.appendChild(opt);
      });
      currentIndex = 0;
      cardSelect.value = 0;
      renderCard();
    }

    function renderCard() {
      const card = filteredCards[currentIndex];
      if (!card) return;
      const themeOverride = colorFilter.value.endsWith('-alt') ? colorFilter.value : null;
      const theme = THEMES[themeOverride || card.color];

      // Set CSS custom properties
      cardEl.style.setProperty('--card-color', theme.bg);
      cardEl.style.setProperty('--border-color', theme.border);
      cardEl.style.setProperty('--dark-border', theme.darkBorder);
      cardEl.style.setProperty('--text-color', theme.text);
      cardEl.style.setProperty('--sparkle-color', theme.sparkle);

      // Build shafts
      shaftsEl.innerHTML = '';
      SHAFT_DEFS.forEach(def => {
        const shaft = document.createElement('div');
        shaft.className = 'shaft';
        shaft.style.left = def.x;
        shaft.style.width = def.w + 'px';
        shaft.style.setProperty('--shaft-color', theme.shaftColor);
        shaft.style.setProperty('--shaft-color-fade', theme.shaftFade);
        shaftsEl.appendChild(shaft);
      });

      // Split name into two lines and auto-size to fit
      const words = card.name.split(' ');
      nameEl.innerHTML = words.join('<br>');

      // Auto-scale: measure each word's natural width with a hidden probe
      const nameBox = nameEl.parentElement;
      const maxWidth = nameBox.clientWidth - 20; // some padding
      const maxHeight = nameBox.clientHeight;
      const longestWord = words.reduce((a, b) => a.length > b.length ? a : b);

      const probe = document.createElement('span');
      probe.style.cssText = "font-family:'Cinzel Decorative','Cinzel',serif;font-weight:700;white-space:nowrap;visibility:hidden;position:absolute;left:-9999px;";
      document.body.appendChild(probe);

      let fontSize = 160;
      while (fontSize > 50) {
        probe.style.fontSize = fontSize + 'px';
        probe.textContent = longestWord;
        const wordWidth = probe.offsetWidth;
        const totalHeight = fontSize * 1.1 * 2; // 2 lines, line-height 1.1
        if (wordWidth <= maxWidth && totalHeight <= maxHeight) break;
        fontSize -= 4;
      }
      document.body.removeChild(probe);
      nameEl.style.fontSize = fontSize + 'px';

      iconEl.innerHTML = ICONS[card.number] || '';

      // QR code
      qrEl.innerHTML = '';
      const qr = qrcode(0, 'M');
      qr.addData(card.shortUrl);
      qr.make();

      const moduleCount = qr.getModuleCount();
      const canvas = document.createElement('canvas');
      const size = 420;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const cellSize = size / moduleCount;
      ctx.clearRect(0, 0, size, size);

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillStyle = theme.qrFill;
            ctx.fillRect(col * cellSize, row * cellSize, cellSize + 0.5, cellSize + 0.5);
          }
        }
      }

      qrEl.appendChild(canvas);

      // Info
      infoEl.innerHTML = `<strong>${card.name}</strong> &middot; ${card.color} #${card.number}<br>${card.shortUrl}<br><span style="color:#444">${card.id}</span>`;
    }

    colorFilter.addEventListener('change', populateCardSelect);
    cardSelect.addEventListener('change', () => {
      currentIndex = parseInt(cardSelect.value);
      renderCard();
    });
    prevBtn.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
      cardSelect.value = currentIndex;
      renderCard();
    });
    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % filteredCards.length;
      cardSelect.value = currentIndex;
      renderCard();
    });

    flipBtn.addEventListener('click', () => {
      showingBack = !showingBack;
      flipBtn.textContent = showingBack ? 'Flip (Front)' : 'Flip (Back)';
      document.querySelector('.card-content').style.display = showingBack ? 'none' : '';
      document.querySelectorAll('.corner-spade').forEach(el => el.style.display = showingBack ? 'none' : '');
      document.getElementById('cardBackContent').style.display = showingBack ? '' : 'none';
    });

    // Init — force-load the display font before measuring text
    Promise.all([
      document.fonts.load('700 100px "Cinzel Decorative"'),
      document.fonts.load('900 100px "Cinzel"'),
    ]).then(() => {
      populateCardSelect();
    });
  </script>
</body>
