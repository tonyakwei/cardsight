<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CardSight - Physical Card Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #ccc;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      color: #d4a017;
      margin-bottom: 6px;
      font-size: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin: 16px 0 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls select, .controls button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      font-size: 14px;
      cursor: pointer;
    }

    .controls select:hover, .controls button:hover {
      border-color: #666;
    }

    .preview-area {
      transform: scale(var(--preview-scale, 0.42));
      transform-origin: top center;
      margin-bottom: -600px;
    }

    /* === CARD === */
    .card {
      width: 1050px;
      height: 1725px;
      position: relative;
      border-radius: 42px;
      overflow: hidden;
    }

    /* Background layer: base color */
    .card-bg {
      position: absolute;
      inset: 0;
      background: var(--card-color);
    }

    /* Light shafts — ATN style, thick diagonal bands toward bottom-left */
    .card-shafts {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .shaft {
      position: absolute;
      top: -60%;
      height: 280%;
      transform: rotate(30deg);
      transform-origin: center center;
      background: linear-gradient(
        to right,
        transparent 0%,
        var(--shaft-color) 20%,
        var(--shaft-color) 50%,
        var(--shaft-color-fade) 80%,
        transparent 100%
      );
    }

    /* Sparkles */
    .card-sparkles {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(2.5px 2.5px at 180px 250px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 750px 400px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 400px 700px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 850px 900px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 250px 1100px, var(--sparkle-color), transparent),
        radial-gradient(2.5px 2.5px at 600px 1300px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 900px 1500px, var(--sparkle-color), transparent),
        radial-gradient(3.5px 3.5px at 150px 1550px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 500px 300px, var(--sparkle-color), transparent),
        radial-gradient(2.5px 2.5px at 700px 1050px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 350px 1400px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 820px 200px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 480px 1600px, var(--sparkle-color), transparent),
        radial-gradient(3px 3px at 130px 800px, var(--sparkle-color), transparent),
        radial-gradient(1.5px 1.5px at 300px 450px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 650px 650px, var(--sparkle-color), transparent),
        radial-gradient(2.5px 2.5px at 950px 1200px, var(--sparkle-color), transparent),
        radial-gradient(2px 2px at 100px 1000px, var(--sparkle-color), transparent);
      pointer-events: none;
    }

    /* Outer dark border */
    .card-outer-border {
      position: absolute;
      inset: 0;
      border: 10px solid var(--dark-border);
      border-radius: 42px;
      pointer-events: none;
      z-index: 3;
    }

    /* Main color border (the prominent one) */
    .card-color-border {
      position: absolute;
      inset: 10px;
      border: 38px solid var(--border-color);
      border-radius: 32px;
      pointer-events: none;
      z-index: 3;
    }

    /* Corner spade spokes — pointing inward from corners */
    .corner-spade {
      position: absolute;
      z-index: 4;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      color: var(--dark-border);
      line-height: 1;
    }
    .corner-spade-tl {
      top: 24px;
      left: 24px;
      transform: rotate(135deg);
    }
    .corner-spade-tr {
      top: 24px;
      right: 24px;
      transform: rotate(225deg);
    }
    .corner-spade-bl {
      bottom: 24px;
      left: 24px;
      transform: rotate(45deg);
    }
    .corner-spade-br {
      bottom: 24px;
      right: 24px;
      transform: rotate(-45deg);
    }

    /* Content area */
    .card-content {
      position: absolute;
      inset: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 50px 5px 40px;
      z-index: 2;
    }

    .card-name-box {
      width: 100%;
      height: 430px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-name {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-weight: 700;
      color: var(--text-color);
      text-align: center;
      line-height: 1.1;
      text-shadow:
        3px 3px 6px rgba(0,0,0,0.6),
        0 0 30px rgba(0,0,0,0.3);
      width: 100%;
      padding: 0 10px;
    }

    .card-number {
      font-family: 'Cinzel', serif;
      font-size: 200px;
      font-weight: 900;
      color: var(--text-color);
      text-shadow:
        3px 3px 8px rgba(0,0,0,0.6),
        0 0 40px rgba(0,0,0,0.2);
      opacity: 0.8;
    }

    .card-qr {
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-qr canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    /* Info below card */
    .card-info {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

        : CARDS.filter(c => c.color === color);
      filteredCards.forEach((c, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${c.color} ${c.number} — ${c.name}`;
        cardSelect.appendChild(opt);
      });
      currentIndex = 0;
      cardSelect.value = 0;
      renderCard();
    }

    function renderCard() {
      const card = filteredCards[currentIndex];
      if (!card) return;
      const theme = THEMES[card.color];

      // Set CSS custom properties
      cardEl.style.setProperty('--card-color', theme.bg);
      cardEl.style.setProperty('--border-color', theme.border);
      cardEl.style.setProperty('--dark-border', theme.darkBorder);
      cardEl.style.setProperty('--text-color', theme.text);
      cardEl.style.setProperty('--sparkle-color', theme.sparkle);

      // Build shafts
      shaftsEl.innerHTML = '';
      SHAFT_DEFS.forEach(def => {
        const shaft = document.createElement('div');
        shaft.className = 'shaft';
        shaft.style.left = def.x;
        shaft.style.width = def.w + 'px';
        shaft.style.setProperty('--shaft-color', theme.shaftColor);
        shaft.style.setProperty('--shaft-color-fade', theme.shaftFade);
        shaftsEl.appendChild(shaft);
      });

      // Split name into two lines and auto-size to fit
      const words = card.name.split(' ');
      nameEl.innerHTML = words.join('<br>');

      // Auto-scale: measure each word's natural width with a hidden probe
      const nameBox = nameEl.parentElement;
      const maxWidth = nameBox.clientWidth - 20; // some padding
      const maxHeight = nameBox.clientHeight;
      const longestWord = words.reduce((a, b) => a.length > b.length ? a : b);

      const probe = document.createElement('span');
      probe.style.cssText = "font-family:'Cinzel Decorative','Cinzel',serif;font-weight:700;white-space:nowrap;visibility:hidden;position:absolute;left:-9999px;";
      document.body.appendChild(probe);

      let fontSize = 160;
      while (fontSize > 50) {
        probe.style.fontSize = fontSize + 'px';
        probe.textContent = longestWord;
        const wordWidth = probe.offsetWidth;
        const totalHeight = fontSize * 1.1 * 2; // 2 lines, line-height 1.1
        if (wordWidth <= maxWidth && totalHeight <= maxHeight) break;
        fontSize -= 4;
      }
      document.body.removeChild(probe);
      nameEl.style.fontSize = fontSize + 'px';

      numberEl.textContent = card.number;

      // QR code
      qrEl.innerHTML = '';
      const qr = qrcode(0, 'M');
      qr.addData(card.shortUrl);
      qr.make();

      const moduleCount = qr.getModuleCount();
      const canvas = document.createElement('canvas');
      const size = 420;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const cellSize = size / moduleCount;
      ctx.clearRect(0, 0, size, size);

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillStyle = theme.qrFill;
            ctx.fillRect(col * cellSize, row * cellSize, cellSize + 0.5, cellSize + 0.5);
          }
        }
      }

      qrEl.appendChild(canvas);

      // Info
      infoEl.innerHTML = `<strong>${card.name}</strong> &middot; ${card.color} #${card.number}<br>${card.shortUrl}<br><span style="color:#444">${card.id}</span>`;
    }

    colorFilter.addEventListener('change', populateCardSelect);
    cardSelect.addEventListener('change', () => {
      currentIndex = parseInt(cardSelect.value);
      renderCard();
    });
    prevBtn.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
      cardSelect.value = currentIndex;
      renderCard();
    });
    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % filteredCards.length;
      cardSelect.value = currentIndex;
      renderCard();
    });

    // Init — force-load the display font before measuring text
    Promise.all([
      document.fonts.load('700 100px "Cinzel Decorative"'),
      document.fonts.load('900 100px "Cinzel"'),
    ]).then(() => {
      populateCardSelect();
    });
  </script>
</body>
</html>
