<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Hanging Garden of Names — Canopy Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap"
  />
  <style>
    @page { size: letter portrait; margin: 0.5in; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Georgia', 'Times New Roman', serif; color: #1a1a1a; background: #fff; }

    .container {
      width: 7.5in;
      margin: 0 auto;
      padding: 0;
      box-sizing: border-box;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.04em;
      margin: 0 0 0.25in 0;
      padding-top: 0.05in;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 0.75in);
      grid-auto-rows: 0.75in;
      width: 7.5in;
      gap: 0;
      border-left: 1px solid #cbb;
      border-top: 1px solid #cbb;
    }

    .cell {
      border-right: 1px solid #cbb;
      border-bottom: 1px solid #cbb;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-sizing: border-box;
    }

    .cell .emoji {
      font-size: 32px;
      line-height: 1;
      /* keep emoji centered; superscript number sits to the right */
    }

    .cell .num {
      position: absolute;
      top: 4px;
      right: 6px;
      font-family: 'Georgia', serif;
      font-size: 11px;
      font-weight: 700;
      color: #444;
      line-height: 1;
    }

    .controls {
      max-width: 7.5in;
      margin: 12px auto;
      text-align: center;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .controls button {
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid #888;
      background: #f6e5b3;
      cursor: pointer;
      margin: 0 4px;
    }

    @media print {
      .controls { display: none !important; }
      body { background: #fff !important; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="window.print()">Print</button>
    <button onclick="reroll()">Reroll decoys</button>
  </div>
  <div class="container">
    <div class="title">The Hanging Garden of Names</div>
    <div class="grid" id="grid"></div>
  </div>
  <script>
    // 10 cols × 12 rows = 120 cells
    const COLS = 10;
    const ROWS = 12;

    // Coordinates are [col, row, number?]. col 0..9, row 0..11.
    // Row 0 is the top; col 0 is the leftmost.

    // QRian super-glyph J (🤐 Closers) — 4 numbered cells trace ONE
    // vertical stroke (the leftmost). The middle and right strokes are
    // 8 unnumbered Closer cells that "stand alone" — they belong to the
    // J glyph (3 vertical lines with 2 small gaps) but the trace doesn't
    // pass through them. Same pattern as Drake's B (U-shape traced + an
    // unnumbered cell standing alone inside it), just scaled up: more
    // unnumbered cells, fewer traced cells.
    const J_CELLS = [
      [1, 1, 1],   // top of traced stroke
      [1, 2, 2],
      [1, 3, 3],
      [1, 4, 4],   // bottom of traced stroke
      [3, 1, null], [3, 2, null], [3, 3, null], [3, 4, null], // middle stroke, unnumbered
      [5, 1, null], [5, 2, null], [5, 3, null], [5, 4, null], // right stroke, unnumbered
    ];

    // QRian super-glyph A (😮 Openers) — 7 numbered cells trace
    // top + right + bottom edges of a square (open on the left).
    // 1 unnumbered cell at center (the dot inside the C-shape).
    const A_CELLS = [
      [0, 6, 1],    // TL
      [2, 6, 2],    // TM
      [4, 6, 3],    // TR
      [4, 8, 4],    // MR
      [4, 10, 5],   // BR
      [2, 10, 6],   // BM
      [0, 10, 7],   // BL
      [2, 8, null], // unnumbered dot inside the C
    ];

    // QRian super-glyph W (😤 Carriers) — 7 numbered cells trace a
    // serif T (stem + top stroke; line 6→7 retraces leftward across
    // the top stroke from the right corner to the left corner). Two
    // unnumbered cells hang one row below each top corner as serifs.
    const W_CELLS = [
      [7, 8, 1],    // stem bottom
      [7, 7, 2],    // stem
      [7, 6, 3],    // stem
      [7, 5, 4],    // stem top / top stroke center
      [8, 5, 5],    // top heading right
      [9, 5, 6],    // top right corner
      [5, 5, 7],    // top left corner (line retraces leftward across row 5)
      [5, 6, null], // left serif (hangs below corner)
      [9, 6, null], // right serif (hangs below corner)
    ];

    // Deterministic PRNG so the decoy distribution is stable across reloads
    // (and so missing-flower bug-reports can be reproduced).
    let SEED = 42;
    function mulberry32(seed) {
      let a = seed >>> 0;
      return function () {
        a = (a + 0x6D2B79F5) >>> 0;
        let t = a;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // Map ASCII digit to Unicode superscript
    const SUPER = { 0: '⁰', 1: '¹', 2: '²', 3: '³', 4: '⁴', 5: '⁵', 6: '⁶', 7: '⁷', 8: '⁸', 9: '⁹' };
    function toSuperscript(n) {
      return String(n).split('').map((d) => SUPER[d] ?? d).join('');
    }

    function buildGrid(seed) {
      const rand = mulberry32(seed);
      const cells = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

      for (const [c, r, n] of J_CELLS) cells[r][c] = { emoji: '🤐', n };
      for (const [c, r, n] of A_CELLS) cells[r][c] = { emoji: '😮', n };
      for (const [c, r, n] of W_CELLS) cells[r][c] = { emoji: '😤', n };

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!cells[r][c]) {
            // Decoys are mouth-neutral faces that don't read as any of
            // the three articulation classes (closed / parted / breath).
            const emoji = rand() < 0.55 ? '😶' : '🫥';
            // Red-herring superscript so decoys don't visually stand out as
            // "unnumbered."
            const n = 1 + Math.floor(rand() * 9);
            cells[r][c] = { emoji, n };
          }
        }
      }
      return cells;
    }

    function render(seed) {
      const cells = buildGrid(seed);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = cells[r][c];
          const div = document.createElement('div');
          div.className = 'cell';
          const emoji = document.createElement('span');
          emoji.className = 'emoji';
          emoji.textContent = cell.emoji;
          div.appendChild(emoji);
          if (cell.n != null) {
            const num = document.createElement('span');
            num.className = 'num';
            num.textContent = toSuperscript(cell.n);
            div.appendChild(num);
          }
          grid.appendChild(div);
        }
      }
    }

    function reroll() {
      SEED = Math.floor(Math.random() * 1e9);
      render(SEED);
    }

    render(SEED);
  </script>
</body>
</html>
