<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Reckoning Floor — Pebble Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap"
  />
  <style>
    @page { size: letter portrait; margin: 0.5in; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Georgia', 'Times New Roman', serif; color: #1a1a1a; background: #fff; }

    .container {
      width: 7.5in;
      margin: 0 auto;
      padding: 0;
      box-sizing: border-box;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.04em;
      margin: 0 0 0.25in 0;
      padding-top: 0.05in;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 0.75in);
      grid-auto-rows: 0.75in;
      width: 7.5in;
      gap: 0;
      border-left: 1px solid #cbb;
      border-top: 1px solid #cbb;
    }

    .cell {
      border-right: 1px solid #cbb;
      border-bottom: 1px solid #cbb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      position: relative;
      box-sizing: border-box;
    }

    .cell .stone {
      font-size: 18px;
      line-height: 1;
    }

    .cell .digit {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 22px;
      line-height: 1;
      color: #1a1a1a;
    }

    .controls {
      max-width: 7.5in;
      margin: 12px auto;
      text-align: center;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .controls button {
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid #888;
      background: #f6e5b3;
      cursor: pointer;
      margin: 0 4px;
    }

    @media print {
      .controls { display: none !important; }
      body { background: #fff !important; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="window.print()">Print</button>
    <button onclick="reroll()">Reroll decoys</button>
  </div>
  <div class="container">
    <div class="title">The Reckoning Floor</div>
    <div class="grid" id="grid"></div>
  </div>
  <script>
    // 10 cols × 12 rows = 120 cells
    const COLS = 10;
    const ROWS = 12;

    // The Reckoning Floor uses a different mechanic from Drake's flower
    // grid and Jones's canopy map: every cell of a glyph is marked with
    // the SAME class digit (no per-cell sequence numbering). Players
    // identify all cells of a class by their shared digit, and the SET
    // of those cells visually forms a QRian super-glyph. Decoy cells
    // bear non-class digits and are seeded into deliberate distractor
    // shapes (clusters and lines) that mimic glyph patterns without
    // matching any class.

    // Class digits: 3, 5, 7, 9. Decoy digits: 0, 1, 2, 4, 6, 8.

    // ─── QRian super-glyph T (digit 3) — plus / Greek cross ───
    // Top-left of grid. 3×3 plus shape, all 5 cells filled.
    const T_CELLS = [
      [1, 0],  // top arm
      [0, 1],  // left arm
      [1, 1],  // center
      [2, 1],  // right arm
      [1, 2],  // bottom arm
    ];

    // ─── QRian super-glyph I (digit 5) — 3 verticals + bottom bar ───
    // Middle-left. 3 vertical strokes at cols 0/2/4, rows 3-6, with the
    // bottom row (6) acting as the connecting bar across all 5 cols.
    const I_CELLS = [
      // Left vertical
      [0, 3], [0, 4], [0, 5], [0, 6],
      // Middle vertical
      [2, 3], [2, 4], [2, 5], [2, 6],
      // Right vertical
      [4, 3], [4, 4], [4, 5], [4, 6],
      // Bar fill (gaps between verticals at row 6)
      [1, 6], [3, 6],
    ];

    // ─── QRian super-glyph M (digit 7) — squat rectangle + stick ───
    // Right side. 4-wide × 2-tall rectangle (cols 5-8, rows 4-5) with
    // a vertical stick (col 6) extending from the bottom of the rect
    // up through it and 4 more units above.
    const M_CELLS = [
      // Stick above the rectangle
      [6, 0], [6, 1], [6, 2], [6, 3],
      // Rectangle top edge (stick passes through (6, 4))
      [5, 4], [6, 4], [7, 4], [8, 4],
      // Rectangle bottom edge (stick passes through (6, 5))
      [5, 5], [6, 5], [7, 5], [8, 5],
    ];

    // ─── QRian super-glyph E (digit 9) — closed rectangle + middle bar ───
    // Bottom-left. Same shape as Drake's E (square + middle bar),
    // shifted to cols 0-4, rows 7-11.
    const E_CELLS = [
      // Top edge (row 7, cols 0-4)
      [0, 7], [1, 7], [2, 7], [3, 7], [4, 7],
      // Left and right edges between top and middle (row 8)
      [0, 8], [4, 8],
      // Middle bar (row 9, cols 0-4)
      [0, 9], [1, 9], [2, 9], [3, 9], [4, 9],
      // Left and right edges between middle and bottom (row 10)
      [0, 10], [4, 10],
      // Bottom edge (row 11, cols 0-4)
      [0, 11], [1, 11], [2, 11], [3, 11], [4, 11],
    ];

    // ─── Decoy distractor patterns ───
    // Lines and clusters of non-class digits, designed to add visual
    // density and tempt the eye toward false-glyph shapes.

    // Plus of 1s (mimics T pattern) — bottom-right area
    const DECOY_PLUS = [
      [6, 8],         // top arm
      [5, 9], [6, 9], [7, 9],  // horizontal bar
      [6, 10],        // bottom arm
    ];

    // Vertical line of 4s — far right column, top
    const DECOY_VLINE = [
      [9, 0], [9, 1], [9, 2], [9, 3],
    ];

    // 2×3 cluster of 6s — bottom-right
    const DECOY_BLOCK = [
      [7, 10], [8, 10],
      [7, 11], [8, 11],
      [9, 10], [9, 11],
    ];

    // Horizontal line of 8s with perpendicular spike (T-like fake) —
    // middle-right of grid, sits in the gap between M (rows 0-5) and
    // the bottom-right region.
    const DECOY_TFAKE = [
      [5, 6], [6, 6], [7, 6], [8, 6],  // horizontal
      [8, 7],                          // spike
    ];

    // Diagonal of 2s — top-middle
    const DECOY_DIAG = [
      [3, 0], [4, 1], [5, 2],
    ];

    // Deterministic PRNG so the random-decoy distribution is stable
    // across reloads and bug reports.
    let SEED = 42;
    function mulberry32(seed) {
      let a = seed >>> 0;
      return function () {
        a = (a + 0x6D2B79F5) >>> 0;
        let t = a;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function buildGrid(seed) {
      const rand = mulberry32(seed);
      const cells = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

      // Place class glyphs
      for (const [c, r] of T_CELLS) cells[r][c] = { digit: 3 };
      for (const [c, r] of I_CELLS) cells[r][c] = { digit: 5 };
      for (const [c, r] of M_CELLS) cells[r][c] = { digit: 7 };
      for (const [c, r] of E_CELLS) cells[r][c] = { digit: 9 };

      // Place decoy distractor patterns
      for (const [c, r] of DECOY_PLUS)  cells[r][c] = { digit: 1 };
      for (const [c, r] of DECOY_VLINE) cells[r][c] = { digit: 4 };
      for (const [c, r] of DECOY_BLOCK) cells[r][c] = { digit: 6 };
      for (const [c, r] of DECOY_TFAKE) cells[r][c] = { digit: 8 };
      for (const [c, r] of DECOY_DIAG)  cells[r][c] = { digit: 2 };

      // Random scatter for remaining cells. Avoid class digits (3, 5, 7, 9)
      // so the only 3s/5s/7s/9s on the floor are class-glyph cells.
      const decoyDigits = [0, 1, 2, 4, 6, 8];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!cells[r][c]) {
            const digit = decoyDigits[Math.floor(rand() * decoyDigits.length)];
            cells[r][c] = { digit };
          }
        }
      }
      return cells;
    }

    function render(seed) {
      const cells = buildGrid(seed);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = cells[r][c];
          const div = document.createElement('div');
          div.className = 'cell';
          const stone = document.createElement('span');
          stone.className = 'stone';
          stone.textContent = '🪨';
          div.appendChild(stone);
          const digit = document.createElement('span');
          digit.className = 'digit';
          digit.textContent = String(cell.digit);
          div.appendChild(digit);
          grid.appendChild(div);
        }
      }
    }

    function reroll() {
      SEED = Math.floor(Math.random() * 1e9);
      render(SEED);
    }

    render(SEED);
  </script>
</body>
</html>
